{% if variant == "secondary" %}
<button type="{{ type|default:'submit' }}" class="btn btn-outline-secondary"{% if name %} name="{{ name }}"{% endif %}{% if value %} value="{{ value }}"{% endif %}{% if id %} id="{{ id }}"{% endif %}>{{ label }}</button>
{% else %}
<button type="{{ type|default:'submit' }}" class="btn btn-success"{% if name %} name="{{ name }}"{% endif %}{% if value %} value="{{ value }}"{% endif %}{% if id %} id="{{ id }}"{% endif %}>{{ label }}</button>
{% endif %}
